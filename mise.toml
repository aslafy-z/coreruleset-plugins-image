[tools]
yq = "4.44.3"
jq = "1.7.1"
shellcheck = "0.10.0"
cosign = "2.4.1"
"go:github.com/google/go-containerregistry/cmd/crane" = "latest"

[tasks.lint]
description = "Shellcheck all scripts"
run = "shellcheck scripts/*.sh"

[tasks.build]
description = "Stage plugins and build manifest without pushing"
run = "scripts/build-plugins.sh"

[tasks.sync]
description = "Reconcile registry and resolve versions into plugins.yaml"
run = "scripts/sync-plugins.sh"

[tasks.artifact]
description = "Pack release tarball and checksums from staged payload"
run = "scripts/pack-artifacts.sh"

[tasks.docs]
description = "Render README plugins table and release notes from manifest"
run = "scripts/render-docs.sh manifest.json"

[tasks.all]
description = "Sync, build, render docs, and pack artifacts locally (stamps a dev version)"
run = """
scripts/sync-plugins.sh
scripts/build-plugins.sh
tmp="$(mktemp)"; jq '.version="0.0.0-dev"' staging/manifest.json >"$tmp"
mv "$tmp" staging/manifest.json; cp staging/manifest.json manifest.json
scripts/render-docs.sh manifest.json
scripts/pack-artifacts.sh
"""

[tasks.clean]
description = "Remove generated build artifacts"
run = "rm -rf staging dist manifest.json *.tar.gz SHA256SUMS"
